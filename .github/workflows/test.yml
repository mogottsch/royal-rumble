name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/laravel
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, intl, pdo_sqlite, bcmath
          coverage: none
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run Pest
        run: vendor/bin/pest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          VITE_BACKEND_URL: https://suffroyale.com
          VITE_PUSHER_HOST: ws.suffroyale.com
          VITE_PUSHER_PORT: "443"
          VITE_PUSHER_SCHEME: https
          VITE_PUSHER_APP_KEY: dummy
