version: "3.9"
services:

  frontend:
    build: rumble
    networks:
      - sail

  api:
    build:
      context: ./peasant/laravel/docker/8.3
      dockerfile: Dockerfile
      args:
        WWWGROUP: 1000
    image: sail-8.3/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WWWUSER: "1000"
      LARAVEL_SAIL: 1
      XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}"
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - "./peasant/laravel:/var/www/html"
    networks:
      - sail
    depends_on:
      - mysql
      - redis
      - soketi

  mysql:
    image: "mysql/mysql-server:8.0"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - "sail-mysql:/var/lib/mysql"
      - "./scripts/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh"
    networks:
      - sail
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s

  redis:
    image: "redis:alpine"
    volumes:
      - "sail-redis:/data"
    networks:
      - sail
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
  # phpmyadmin:
  #   image: "phpmyadmin/phpmyadmin"
  #   ports:
  #     - "${FORWARD_PMA_PORT:-8080}:80"
  #   environment:
  #     PMA_HOST: mysql
  #     PMA_PORT: 3306
  #     PMA_USER: "root"
  #     PMA_PASSWORD: "${DB_PASSWORD}"
  #     PMA_ARBITRARY: 1
  #   networks:
  #     - sail
  #   depends_on:
  #     - mysql

  soketi:
    image: "quay.io/soketi/soketi:latest-16-alpine"
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_METRICS_SERVER_PORT: "9601"
    restart: unless-stopped
    volumes:
      - "./nginx/certs:/app/certs"
    networks:
      - sail

networks:
  sail:
    driver: bridge
volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local
