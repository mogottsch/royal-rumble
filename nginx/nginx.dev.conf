events {}
http {
    server {
        listen 80;

        location /api/ {
            proxy_pass http://api;
        }

        location / {
            proxy_pass http://frontend:5173;
        }
    }

    server {
        listen 6001;

        location / {
            proxy_pass http://soketi:6001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
