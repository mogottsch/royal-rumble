events {}
http {
    server {
        listen 80;
        listen 443 default_server ssl;
        server_name _;
        ssl_certificate /etc/nginx/certs/suffroyale.com.cer;
        ssl_certificate_key /etc/nginx/certs/suffroyale.com.key;

        location /api/ {
            proxy_pass http://api;
        }

        location / {
            proxy_pass http://frontend:5173;
        }
    }

    server {
        listen 6001 ssl;
        ssl_certificate /etc/nginx/certs/suffroyale.com.cer;
        ssl_certificate_key /etc/nginx/certs/suffroyale.com.key;

        location / {
            proxy_pass http://soketi:6001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
