version: "3.9"
services:
  frontend:
    build: frontend
    restart: always
    networks:
      - sail
      - compose
  api:
    build:
      context: ./backend/laravel/docker/8.3
      dockerfile: Dockerfile
      args:
        WWWGROUP: 1000
    image: sail-8.3/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WWWUSER: "1000"
      LARAVEL_SAIL: 1
      XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}"
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - "./backend/laravel:/var/www/html"
    networks:
      - sail
      - compose
    restart: always
    depends_on:
      - mysql
      - redis
      - soketi

  mysql:
    image: "mysql/mysql-server:8.0"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - "sail-mysql:/var/lib/mysql"
      - "./scripts/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh"
    networks:
      - sail
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s

  redis:
    image: "redis:alpine"
    volumes:
      - "sail-redis:/data"
    networks:
      - sail
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  soketi:
    image: "quay.io/soketi/soketi:latest-16-alpine"
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_METRICS_SERVER_PORT: "9601"
    restart: always
    networks:
      - sail
      - compose

networks:
  sail:
    driver: bridge
  compose:
    external: true
volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local
