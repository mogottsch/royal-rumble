services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: royal
      POSTGRES_PASSWORD: royal
      POSTGRES_DB: royal
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U royal -d royal"]
      interval: 2s
      timeout: 3s
      retries: 20

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: app-id
      SOKETI_DEFAULT_APP_KEY: app-key
      SOKETI_DEFAULT_APP_SECRET: app-secret
    ports:
      - "127.0.0.1:6001:6001"

  api:
    build:
      context: ./backend/laravel
      dockerfile: docker/dev/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      soketi:
        condition: service_started
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:skC6515ruMK0nTrlg5sy6w8SLjOmBjaZRiXUL/uDWr0=
      APP_URL: http://localhost:8088
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: royal
      DB_USERNAME: royal
      DB_PASSWORD: royal
      BROADCAST_DRIVER: pusher
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_APP_ID: app-id
      PUSHER_APP_KEY: app-key
      PUSHER_APP_SECRET: app-secret
      PUSHER_SCHEME: http
      PUSHER_APP_CLUSTER: mt1
    volumes:
      - ./backend/laravel:/app
      - ./crawler/data/saved_superstars.json:/app/storage/app/saved_superstars.json:ro
      - ./crawler/data/matches:/app/storage/app/royal_rumble_matches:ro
      - ./crawler/data/images:/app/storage/app/public/wrestlers:ro
    ports:
      - "127.0.0.1:8088:8088"
    command: >
      sh -c "
      composer install --no-interaction --prefer-dist &&
      php artisan storage:link || true &&
      php artisan migrate --force &&
      php artisan db:seed --class=ProductiveSeeder --force || true &&
      php artisan serve --host=0.0.0.0 --port=8088
      "

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    depends_on:
      api:
        condition: service_started
      soketi:
        condition: service_started
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_BACKEND_URL: http://localhost:8088
      VITE_PUSHER_HOST: localhost
      VITE_PUSHER_PORT: 6001
      VITE_PUSHER_SCHEME: http
      VITE_PUSHER_APP_KEY: app-key
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
      - "127.0.0.1:4784:4784"

volumes:
  db:
  frontend_node_modules:
